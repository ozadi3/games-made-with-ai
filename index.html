<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עולם המשחקים שלי ✨</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #2d3436;
        }

        header {
            padding: 50px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--primary);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-10px);
        }

        .game-img {
            width: 100%;
            height: 180px;
            background: var(--secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
        }

        .game-info {
            padding: 20px;
            text-align: center;
        }

        .game-info h2 {
            margin: 0 0 10px 0;
            color: var(--primary);
        }

        .btn-play {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            border-radius: 25px;
            font-weight: bold;
        }

        .coming-soon {
            opacity: 0.7;
            filter: grayscale(1);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<header>
    <h1>המשחקים שלי ✨</h1>
    <p>ברוכים הבאים! בחרו משחק והתחילו ליהנות.</p>
</header>

<div class="games-grid">
    <a href="puzzle/index.html" class="game-card">
        <div class="game-img">🧩</div>
        <div class="game-info">
            <h2>פאזל קסום</h2>
            <p>משחק פאזל מותאם אישית עם גרירת חלקים וחיתוך חכם.</p>
            <div class="btn-play">שחק עכשיו</div>
        </div>
    </a>

    <a href="coloring/index.html" class="game-card">
        <div class="game-img">🧩</div>
        <div class="game-info">
            <h2>משחק צביעה</h2>
            <p>משחק צביעה מותאם אישית עם כל דף שתמצאו באינטרנט</p>
            <div class="btn-play">צבע עכשיו</div>
        </div>
    </a>

    <div class="game-card coming-soon">
        <div class="game-img">🎮</div>
        <div class="game-info">
            <h2>בקרוב...</h2>
            <p>משחק חדש ומרגש נמצא כרגע בפיתוח.</p>
            <div class="btn-play">נעול</div>
        </div>
    </div>
</div>

</body>
</html>
