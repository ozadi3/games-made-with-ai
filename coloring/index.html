<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>צביעה קסומה - פלטה מקצועית 🎨✨</title>
    <style>
        :root { --pink: #ff6090; --purple: #a060ff; --blue: #3498db; --red: #ff4757; --ui-bg: rgba(255, 255, 255, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: system-ui, sans-serif; 
            background-color: #f1f2f6;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* סרגל עליון */
        .top-bar {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; flex-direction: column; gap: 5px; z-index: 100; align-items: center;
        }
        .search-group { 
            display: flex; gap: 6px; background: var(--ui-bg); padding: 6px 12px; 
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 98%; max-width: 1100px;
        }
        input[type="text"] { flex: 1; border: none; background: #f0f0f0; border-radius: 20px; padding: 8px 15px; outline: none; font-size: 14px; }
        .btn-ui { border: none; border-radius: 20px; color: white; padding: 8px 12px; cursor: pointer; font-weight: bold; font-size: 13px; white-space: nowrap; }

        /* תפריט צד */
        .side-menu {
            position: absolute; right: 12px; top: 45%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 6px; z-index: 100;
        }
        .side-btn {
            width: 48px; height: 48px; border-radius: 14px; border: none;
            background: var(--ui-bg); color: #333; font-size: 22px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .fav-add-btn { position: absolute; top: 110px; left: 20px; z-index: 150; background: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 26px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .fav-add-btn.is-fav { color: var(--red); }

        /* קנבס */
        #viewport { flex: 1; width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: crosshair; }
        .canvas-layer { position: absolute; top: 0; left: 0; transform-origin: 0 0; display: none; }
        #baseCanvas { z-index: 20; mix-blend-mode: multiply; pointer-events: none; }
        #drawingCanvas { z-index: 10; background: white; }

        /* סרגל תחתון מאוחד */
        .bottom-container { 
            position: absolute; bottom: 15px; left: 0; right: 0; 
            display: flex; flex-direction: column; align-items: center; gap: 8px; 
            z-index: 100; pointer-events: none; 
        }
        .theme-bar {
            pointer-events: auto; display: flex; gap: 6px; background: rgba(255,255,255,0.9);
            padding: 6px 12px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .theme-btn { border: none; background: none; font-size: 13px; cursor: pointer; padding: 5px 10px; border-radius: 12px; font-weight: bold; }
        .theme-btn.active { background: #333; color: white; }

        .palette { 
            pointer-events: auto; display: flex; gap: 6px; 
            padding: 12px 20px; background: var(--ui-bg); border-radius: 35px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15); overflow-x: auto; max-width: 98%;
            scrollbar-width: none; /* Firefox */
        }
        .palette::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .color-btn { width: 30px; height: 75px; border-radius: 10px; border: 2.5px solid white; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .color-btn.active { transform: translateY(-15px); border-color: #333; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .eraser-tool { background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* מודלים */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 90%; max-width: 700px; max-height: 80vh; border-radius: 30px; padding: 25px; z-index: 300; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.4); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .grid-item { width: 100%; aspect-ratio: 1; object-fit: contain; border: 2px solid #eee; border-radius: 15px; cursor: pointer; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 290; backdrop-filter: blur(2px); }
        .loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px 40px; border-radius: 30px; z-index: 400; font-weight: bold; }
        .home-button {
    position: fixed;
    top: 20px;
    left: 20px; /* בצד הנגדי לכפתור התפריט */
    z-index: 1001;
    background: rgba(255, 255, 255, 0.9);
    color: var(--primary);
    text-decoration: none;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
    border: 2px solid var(--primary);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.home-button:hover {
    transform: scale(1.1);
    background: var(--primary);
    color: white;
}

/* התאמה למובייל - שלא יתנגש עם אלמנטים אחרים */
@media (max-width: 600px) {
    .home-button {
        width: 50px;
        height: 50px;
        font-size: 24px;
        top: 15px;
        left: 15px;
    }
}
    </style>
</head>
<body>
    <a href="../index.html" class="home-button" title="חזרה לתפריט הראשי">🏠</a>
    <div id="loader" class="loader">טוען... ✨</div>
    <div id="modalOverlay" class="modal-overlay" onclick="closeAllModals()"></div>

    <button id="floatingFavBtn" class="fav-add-btn" onclick="toggleFavoriteCurrent()">🤍</button>

    <div class="top-bar">
        <div class="search-group">
            <button class="btn-ui" style="background: var(--purple)" onclick="openGallery()">🖼️ גלריה</button>
            <input type="text" id="searchInput" placeholder="חפשי דף (נסיכה, חיות, רכב)...">
            <button class="btn-ui" style="background: var(--pink)" onclick="searchImage()">חיפוש</button>
            <input type="text" id="urlInput" placeholder="הדביקי URL של תמונה...">
            <button class="btn-ui" style="background: var(--cyan)" onclick="loadFromURL()">טעינה</button>
        </div>
    </div>

    <div class="side-menu">
        <button class="side-btn" onclick="undo()">↩️</button>
        <button class="side-btn" onclick="resetCanvasColor()" style="color: var(--red)">🧹</button>
        <button class="side-btn" onclick="openFavorites()">📂❤️</button>
        <button id="moveBtn" class="side-btn" onclick="toggleMoveMode()">✋</button>
        <button id="musicBtn" class="side-btn" onclick="toggleMusic()">🎼</button>
        <button class="side-btn" onclick="nextStation()">⏭️</button>
        <button class="side-btn" onclick="resetView()" style="color: #e74c3c;">🎯</button>
        <button class="side-btn" onclick="saveImage()" style="color: #2ecc71;">💾</button>
    </div>

    <div id="galleryModal" class="modal"><h2>גלריית דפי צביעה</h2><div id="presetGrid" class="grid-container"></div></div>
    <div id="favoritesModal" class="modal"><h2>המועדפים שלי ❤️</h2><div id="favGrid" class="grid-container"></div></div>

    <div id="viewport">
        <canvas id="drawingCanvas" class="canvas-layer"></canvas>
        <canvas id="baseCanvas" class="canvas-layer"></canvas>
    </div>

    <div class="bottom-container">
        <div class="theme-bar">
            <button class="theme-btn active" onclick="updatePalette('rainbow', this)">🌈 קשת</button>
            <button class="theme-btn" onclick="updatePalette('princess', this)">👑 נסיכות</button>
            <button class="theme-btn" onclick="updatePalette('nature', this)">🌿 טבע</button>
            <button class="theme-btn" onclick="updatePalette('ocean', this)">🌊 ים</button>
            <button class="theme-btn" onclick="updatePalette('sunset', this)">🌅 שקיעה</button>
        </div>
        <div class="palette" id="palette">
            <div class="color-btn eraser-tool" id="eraserBtn" onclick="selectEraser()">🧼</div>
            <div id="dynamicColors" style="display: flex; gap: 6px;"></div>
            <div class="color-btn" style="background: conic-gradient(red,yellow,lime,aqua,blue,magenta,red); position: relative;">
                <input type="color" id="colorInput" oninput="handleCustomColor(this.value)" style="position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer;">
                <span style="position: absolute; bottom: 5px; left: 6px;">🌈</span>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop></audio>

<script>
    const baseCanvas = document.getElementById('baseCanvas');
    const baseCtx = baseCanvas.getContext('2d', { willReadFrequently: true });
    const drawingCanvas = document.getElementById('drawingCanvas');
    const drawingCtx = drawingCanvas.getContext('2d', { willReadFrequently: true });
    const viewport = document.getElementById('viewport');
    const bgMusic = document.getElementById('bgMusic');
    const loader = document.getElementById('loader');

    let currentImgSrc = "", currentColor = { r: 255, g: 0, b: 0 }, historyStack = [];
    let scale = 1, offsetX = 0, offsetY = 0, isMoveMode = false, isEraserMode = false, isDragging = false, lastX=0, lastY=0;

    const presetImages = [
        'https://www.doopi.co.il/img/paints/16972720756.webp',
        'https://nunitoys.com/wp-content/uploads/2026/01/Anna-and-Elsa-Coloring-Pages-1.webp',
        'https://dafbetzeva.co.il/wp-content/uploads/elementor/thumbs/%D7%93%D7%A3-%D7%A6%D7%91%D7%99%D7%A2%D7%94-%D7%A9%D7%9C-%D7%90%D7%9C%D7%96%D7%94-%D7%95%D7%91%D7%99%D7%99%D7%91%D7%99-%D7%90%D7%9C%D7%96%D7%94_webp-r4r8vscfej2v8iyje9vc553z52ero79r4pkp3k04lc.webp',
        'https://dafdafim.co.il/wp-content/uploads/2021/01/%D0%A0%D0%B0%D1%81%D0%BA%D1%80%D0%B0%D1%81%D0%BA%D0%B0-%D0%AD%D0%BB%D1%8C%D0%B7%D0%B0-%D0%B2-%D0%97%D0%B0%D1%87%D0%B0%D1%80%D0%BE%D0%B2%D0%B0%D0%BD%D0%BD%D0%BE%D0%BC-%D0%BB%D0%B5%D1%81%D1%83.jpg',
        'https://www.crayola.com/images/default-source/coloring-page-images/characters/olaf-and-sven-from-disney-frozen-2.png?sfvrsn=fd5a2b90_4',
        'https://i.pinimg.com/736x/4d/d4/fa/4dd4fadcc79fd2c6f4c42f4c363a09f6.jpg'
    ];

    // פלטות של 24 צבעים לכל נושא
    const palettes = {
        rainbow: ['#FF0000','#FF4500','#FF8C00','#FFA500','#FFD700','#FFFF00','#ADFF2F','#7FFF00','#00FF00','#00FA9A','#00FFFF','#00BFFF','#1E90FF','#0000FF','#4B0082','#8A2BE2','#9400D3','#9932CC','#8B008B','#FF00FF','#FF1493','#FF69B4','#FFC0CB','#000000'],
        princess: ['#FFB6C1','#FFC0CB','#FF69B4','#FF1493','#DB7093','#C71585','#E6E6FA','#D8BFD8','#DDA0DD','#EE82EE','#DA70D6','#BA55D3','#9370DB','#8A2BE2','#9400D3','#FFD700','#FFF8DC','#FFE4B5','#F0E68C','#B0E0E6','#AFEEEE','#00CED1','#FFFFFF','#333333'],
        nature: ['#006400','#008000','#228B22','#2E8B57','#3CB371','#8FBC8F','#90EE90','#98FB98','#ADFF2F','#BDB76B','#F0E68C','#DAA520','#B8860B','#8B4513','#A0522D','#D2691E','#CD853F','#F4A460','#DEB887','#BC8F8F','#808000','#556B2F','#2F4F4F','#000000'],
        ocean: ['#000080','#00008B','#0000CD','#0000FF','#4169E1','#1E90FF','#00BFFF','#87CEEB','#87CEFA','#ADD8E6','#B0E0E6','#AFEEEE','#E0FFFF','#00FFFF','#00CED1','#20B2AA','#5F9EA0','#4682B4','#B0C4DE','#708090','#F5F5DC','#FFE4C4','#D2B48C','#000000'],
        sunset: ['#4B0082','#800080','#8B0000','#B22222','#DC143C','#FF0000','#FF4500','#FF6347','#FF7F50','#FF8C00','#FFA500','#FFD700','#FFFF00','#FFFFE0','#FFFACD','#FAFAD2','#FFE4B5','#FFDAB9','#F08080','#E9967A','#CD5C5C','#BC8F8F','#333333','#000000']
    };

    function updatePalette(key, btn) {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        const container = document.getElementById('dynamicColors');
        container.innerHTML = '';
        palettes[key].forEach(hex => {
            const b = document.createElement('div');
            b.className = 'color-btn';
            b.style.backgroundColor = hex;
            b.onclick = () => selectColor(hex, b);
            container.appendChild(b);
        });
        selectColor(palettes[key][0], container.firstChild);
    }

    function selectColor(hex, el) {
        isEraserMode = false;
        currentColor = { r: parseInt(hex.slice(1,3), 16), g: parseInt(hex.slice(3,5), 16), b: parseInt(hex.slice(5,7), 16) };
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function selectEraser() {
        isEraserMode = true;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('eraserBtn').classList.add('active');
    }

    function handleCustomColor(hex) { selectColor(hex, null); }

    function floodFill(startX, startY, fillRGB) {
        const baseData = baseCtx.getImageData(0, 0, baseCanvas.width, baseCanvas.height).data;
        const drawData = drawingCtx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
        const dataD = drawData.data;
        const w = baseCanvas.width, h = baseCanvas.height;
        const pos = (startY * w + startX) * 4;
        if (baseData[pos] < 150 && baseData[pos+1] < 150 && baseData[pos+2] < 150) return;
        saveState();
        const stack = [[startX, startY]], visited = new Uint8Array(w * h);
        while (stack.length > 0) {
            const [x, y] = stack.pop(), idx = y * w + x, p = idx * 4;
            if (x < 0 || x >= w || y < 0 || y >= h || visited[idx]) continue;
            if (baseData[p] < 150 && baseData[p+1] < 150 && baseData[p+2] < 150) continue;
            visited[idx] = 1;
            dataD[p] = fillRGB.r; dataD[p+1] = fillRGB.g; dataD[p+2] = fillRGB.b; dataD[p+3] = 255;
            stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
        }
        drawingCtx.putImageData(drawData, 0, 0); autoSave();
    }

    function loadSpecificURL(url) {
        if(!url) return; loader.style.display = 'block';
        const img = new Image(); img.crossOrigin = "anonymous";
        img.src = url.startsWith('data:') ? url : `https://wsrv.nl/?url=${encodeURIComponent(url)}&n=-1`;
        img.onload = () => {
            currentImgSrc = url;
            baseCanvas.width = drawingCanvas.width = img.width;
            baseCanvas.height = drawingCanvas.height = img.height;
            baseCtx.clearRect(0, 0, img.width, img.height); baseCtx.drawImage(img, 0, 0);
            drawingCtx.clearRect(0, 0, img.width, img.height);
            const saved = localStorage.getItem('save_' + url);
            if(saved) { const sImg = new Image(); sImg.src = saved; sImg.onload = () => drawingCtx.drawImage(sImg, 0, 0); }
            baseCanvas.style.display = drawingCanvas.style.display = 'block';
            resetView(); loader.style.display = 'none'; updateFavUI();
        };
        img.onerror = () => { alert("לא ניתן לטעון תמונה זו"); loader.style.display = 'none'; };
    }

    function handleStart(e) {
        const t = e.touches ? e.touches[0] : e;
        const rect = drawingCanvas.getBoundingClientRect();
        const x = Math.floor((t.clientX - rect.left) / scale);
        const y = Math.floor((t.clientY - rect.top) / scale);
        isDragging = true; lastX = t.clientX; lastY = t.clientY;
        if (isMoveMode) return;
        if (isEraserMode) { saveState(); eraseAt(x, y); } else { floodFill(x, y, currentColor); }
    }

    function eraseAt(x, y) {
        drawingCtx.save(); drawingCtx.beginPath(); drawingCtx.arc(x, y, 20, 0, Math.PI * 2);
        drawingCtx.globalCompositeOperation = 'destination-out'; drawingCtx.fill(); drawingCtx.restore(); autoSave();
    }

    function handleMove(e) {
        if (!isDragging || !isMoveMode) return;
        const t = e.touches ? e.touches[0] : e;
        offsetX += (t.clientX - lastX); offsetY += (t.clientY - lastY);
        lastX = t.clientX; lastY = t.clientY; updateTransform();
    }

    const playlist = ['https://allclassical.streamguys1.com/ac128kmp3', 'https://pub1.181.fm/181-classical_hi', 'https://gb25.streamgates.net/radios-audio/100Disney/icecast.audio'];
    let trackIdx = 0, isPlaying = false;
    function toggleMusic() { 
        if(!isPlaying) { bgMusic.src = playlist[trackIdx]; bgMusic.play(); } else { bgMusic.pause(); }
        isPlaying = !isPlaying; document.getElementById('musicBtn').classList.toggle('active');
    }
    function nextStation() { trackIdx = (trackIdx+1)%playlist.length; if(isPlaying) { bgMusic.src = playlist[trackIdx]; bgMusic.play(); } }

    function autoSave() { if(currentImgSrc) localStorage.setItem('save_' + currentImgSrc, drawingCanvas.toDataURL()); }
    function saveState() { historyStack.push(drawingCtx.getImageData(0,0,drawingCanvas.width,drawingCanvas.height)); if(historyStack.length>15) historyStack.shift(); }
    function undo() { if(historyStack.length) { drawingCtx.putImageData(historyStack.pop(), 0,0); autoSave(); } }
    function resetCanvasColor() { if(confirm("למחוק הכל?")) { drawingCtx.clearRect(0,0,drawingCanvas.width,drawingCanvas.height); autoSave(); } }
    function updateTransform() { baseCanvas.style.transform = drawingCanvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`; }
    function resetView() { scale = Math.min(viewport.clientWidth/baseCanvas.width, viewport.clientHeight/baseCanvas.height)*0.85; offsetX=(viewport.clientWidth-baseCanvas.width*scale)/2; offsetY=120; updateTransform(); }
    function toggleMoveMode() { isMoveMode = !isMoveMode; document.getElementById('moveBtn').classList.toggle('active'); }
    function saveImage() {
        const c = document.createElement('canvas'); c.width=baseCanvas.width; c.height=baseCanvas.height;
        const ctx = c.getContext('2d'); ctx.drawImage(drawingCanvas,0,0); ctx.globalCompositeOperation='multiply'; ctx.drawImage(baseCanvas,0,0);
        const a = document.createElement('a'); a.download='צביעה.png'; a.href=c.toDataURL(); a.click();
    }

    function openGallery() {
        const g = document.getElementById('presetGrid'); g.innerHTML = '';
        presetImages.forEach(src => {
            const i = document.createElement('img'); i.src = src; i.className='grid-item';
            i.onclick = () => { loadSpecificURL(src); closeAllModals(); }; g.appendChild(i);
        });
        document.getElementById('galleryModal').style.display='block'; document.getElementById('modalOverlay').style.display='block';
    }

    async function searchImage() {
        const q = document.getElementById('searchInput').value; if(!q) return;
        loader.style.display = 'block';
        const res = await fetch(`https://pixabay.com/api/?key=55118080-d9cf90c8bf9619b800838ac4d&q=${encodeURIComponent(q)}+coloring+page&image_type=illustration&colors=grayscale`);
        const d = await res.json();
        if(d.hits.length) loadSpecificURL(d.hits[0].webformatURL);
        else { alert("לא נמצאו תוצאות"); loader.style.display='none'; }
    }

    function getFavs() { return JSON.parse(localStorage.getItem('myFavs') || '[]'); }
    function toggleFavoriteCurrent() {
        let f = getFavs(); const i = f.indexOf(currentImgSrc);
        if(i>-1) f.splice(i,1); else f.push(currentImgSrc);
        localStorage.setItem('myFavs', JSON.stringify(f)); updateFavUI();
    }
    function updateFavUI() { document.getElementById('floatingFavBtn').classList.toggle('is-fav', getFavs().includes(currentImgSrc)); }
    function openFavorites() {
        const g = document.getElementById('favGrid'); g.innerHTML = '';
        getFavs().forEach(src => {
            const i = document.createElement('img'); i.src = src; i.className='grid-item';
            i.onclick = () => { loadSpecificURL(src); closeAllModals(); }; g.appendChild(i);
        });
        document.getElementById('favoritesModal').style.display='block'; document.getElementById('modalOverlay').style.display='block';
    }

    function closeAllModals() { document.querySelectorAll('.modal, .modal-overlay').forEach(e=>e.style.display='none'); }
    function loadFromURL() { loadSpecificURL(document.getElementById('urlInput').value); }

    drawingCanvas.addEventListener('mousedown', handleStart); window.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', () => isDragging=false);
    drawingCanvas.addEventListener('touchstart', handleStart); window.addEventListener('touchmove', handleMove); window.addEventListener('touchend', () => isDragging=false);
    
    updatePalette('rainbow');
    loadSpecificURL(presetImages[0]);
</script>
</body>
</html>
