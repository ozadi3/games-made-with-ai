<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>משחק דאבל צבעוני לילדים!</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-hover: #ff5252;
            --secondary: #4ecdc4;
            --bg: #f7fff7;
            --card-bg: #ffffff;
            --accent: #ffe66d;
            --text-color: #2f3e46;
            --success: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', system-ui, Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin: 5px 0;
            color: #1a535c;
            text-align: center;
            text-shadow: 3px 3px 0px var(--accent);
        }

        p {
            margin: 5px 0 15px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a5759;
        }

        /* מסך הרשמה */
        #setup-screen {
            background: white;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 5px solid var(--secondary);
            z-index: 100;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1a535c;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 3px solid #e2e8f0;
            border-radius: 20px;
            font-size: 1.1rem;
            box-sizing: border-box;
            background-color: #f8fafc;
            transition: border-color 0.2s;
            text-align: center;
            font-family: inherit;
            color: var(--text-color);
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: var(--secondary);
            outline: none;
        }

        /* מסך המשחק המרכזי */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 900px;
            text-align: center;
            box-sizing: border-box;
        }

        /* סגנון ברירת מחדל: מצב תורים */
        #game-screen.mode-turns {
            display: block;
        }
        #game-screen.mode-turns #scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            margin-bottom: 20px;
            border: 3px solid #e2e8f0;
        }
        #game-screen.mode-turns #cards-container {
            display: flex;
            gap: 5vw;
            justify-content: center;
            perspective: 1500px;
            width: 100%;
            margin-bottom: 20px;
        }

        #game-screen.mode-turns #play-area {
            width: 100%;
        }

        #game-screen.mode-parallel #play-area {
            display: contents;
        }

        /* --- עיצוב בסיסי משותף למצב דו קרב סימולטני במקביל --- */
        #game-screen.mode-parallel {
            display: flex !important;
            height: 100vh;
            position: relative;
            padding: 0;
            margin: 0 auto;
            box-sizing: border-box;
            width: 100vw;
        }
        #game-screen.mode-parallel #round-header-title {
            display: none; /* מחביא כותרת עליונה כדי לחסוך מקום */
        }
        #game-screen.mode-parallel #scoreboard {
            display: contents; /* מאפשר לפרק את אזורי השחקנים למיקומים חופשיים */
        }

        /* עיצוב כללי של אזורי שחקן */
        .player-score {
            display: flex;
            flex-direction: column;
            padding: 8px 20px;
            border-radius: 16px;
            transition: background-color 0.3s ease;
            box-sizing: border-box;
        }
        .player-score.active-p {
            background-color: #ffe66d;
            box-shadow: inset 0 0 0 2px #f59e0b;
        }
        .player-score .name { font-size: 1.1rem; font-weight: bold; color: #1a535c; white-space: nowrap; }
        .player-score .time { font-size: 1.4rem; font-weight: 900; color: #ff6b6b; white-space: nowrap; }

        #diff-display {
            font-size: 1.05rem; 
            color: #4a5759; 
            font-weight: bold;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 20px;
        }

        #live-status {
            background: var(--secondary);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
            box-shadow: 0 6px 15px rgba(78, 205, 196, 0.4);
        }

        #timer {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }

        /* גודל קלף דינמי - מצב תורים */
        .card-perspective {
            width: 42vw;
            height: 42vw;
            max-width: 310px;
            max-height: 310px;
            min-width: 140px;
            min-height: 140px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-10px); }
            75% { transform: rotateY(180deg) translateX(10px); }
        }
        .card-inner.shake {
            animation: shake 0.3s ease-in-out infinite;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 50%;
            box-shadow: 0 12px 25px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .card-back {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border: 8px solid white;
            color: white;
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.15);
        }

        .card-front {
            background: var(--card-bg);
            border: 8px solid var(--secondary);
            transform: rotateY(180deg);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 5%;
            transition: border-color 0.2s;
            align-items: center;
            justify-items: center;
        }

        /* אייקונים גמישים */
        .symbol {
            font-size: calc(1.4rem + 2.8vw);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        
        @media (min-width: 700px) {
            .symbol { font-size: 4.2rem; }
        }

        .symbol:active { transform: scale(1.3); }

        /* סידור פריסה לפי כמות */
        .card-front.symbols-5 .symbol:nth-child(1) { grid-area: 1 / 2; transform: scale(1.1); }
        .card-front.symbols-5 .symbol:nth-child(2) { grid-area: 2 / 1; transform: scale(0.9); }
        .card-front.symbols-5 .symbol:nth-child(3) { grid-area: 2 / 2; transform: scale(1.3); }
        .card-front.symbols-5 .symbol:nth-child(4) { grid-area: 2 / 3; transform: scale(0.85); }
        .card-front.symbols-5 .symbol:nth-child(5) { grid-area: 3 / 2; transform: scale(1.05); }

        .card-front.symbols-6 .symbol:nth-child(1) { grid-area: 1 / 2; transform: scale(0.95); }
        .card-front.symbols-6 .symbol:nth-child(2) { grid-area: 2 / 1; transform: scale(0.85); }
        .card-front.symbols-6 .symbol:nth-child(3) { grid-area: 2 / 2; transform: scale(1.05); }
        .card-front.symbols-6 .symbol:nth-child(4) { grid-area: 2 / 3; transform: scale(0.85); }
        .card-front.symbols-6 .symbol:nth-child(5) { grid-area: 3 / 1; transform: scale(0.9); }
        .card-front.symbols-6 .symbol:nth-child(6) { grid-area: 3 / 3; transform: scale(0.9); }
        .card-front.symbols-6 .symbol { font-size: calc(1.2rem + 2.2vw); }

        .card-front.symbols-7 .symbol:nth-child(1) { grid-area: 1 / 2; transform: scale(0.9); }
        .card-front.symbols-7 .symbol:nth-child(2) { grid-area: 2 / 1; transform: scale(0.8); }
        .card-front.symbols-7 .symbol:nth-child(3) { grid-area: 2 / 2; transform: scale(1.1); }
        .card-front.symbols-7 .symbol:nth-child(4) { grid-area: 2 / 3; transform: scale(0.8); }
        .card-front.symbols-7 .symbol:nth-child(5) { grid-area: 3 / 1; transform: scale(0.85); }
        .card-front.symbols-7 .symbol:nth-child(6) { grid-area: 3 / 2; transform: scale(0.95); }
        .card-front.symbols-7 .symbol:nth-child(7) { grid-area: 3 / 3; transform: scale(0.85); }
        .card-front.symbols-7 .symbol { font-size: calc(1rem + 1.8vw); }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px #d94e4e;
            transition: all 0.1s ease;
            width: 90%;
            max-width: 320px;
            margin-top: 10px;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0px #d94e4e;
        }

        button:disabled {
            background-color: #cbd5e1;
            box-shadow: 0 4px 0px #94a3b8;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* כפתור הפיכת קלפים — צד ימין, לא במרכז הקלפים */
        #game-screen #action-btn {
            position: fixed;
            right: max(10px, env(safe-area-inset-right));
            top: 50%;
            transform: translateY(-50%);
            z-index: 150;
            width: auto;
            min-width: 72px;
            max-width: 112px;
            margin: 0;
            padding: 14px 10px;
            font-size: 0.9rem;
            line-height: 1.2;
        }

        #game-screen #action-btn:active {
            transform: translateY(calc(-50% + 6px));
            box-shadow: 0 2px 0px #d94e4e;
        }

        #game-screen #action-btn:disabled {
            transform: translateY(-50%);
        }

        .home-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: white;
            color: var(--primary);
            text-decoration: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            border: 2px solid var(--primary);
            transition: 0.3s;
        }

        #timer.penalty-flash {
            color: #e74c3c;
            animation: penalty-pulse 0.4s ease;
        }

        @keyframes penalty-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* ==========================================================================
           1. התאמה מוחלטת למסכי פורטרט (Portrait - אורך) במצב מקביל
           ========================================================================== */
        @media (orientation: portrait) {
            #game-screen.mode-parallel {
                flex-direction: column;
            }
            
            #game-screen.mode-parallel #p1-area {
                position: absolute;
                top: 1.5vh; left: 15px; right: 15px;
                transform: rotate(180deg);
                background: white;
                border: 3px solid var(--secondary);
                border-radius: 15px;
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 8px 20px;
                z-index: 10;
            }

            #game-screen.mode-parallel #p2-area {
                position: absolute;
                bottom: 1.5vh; left: 15px; right: 15px;
                background: white;
                border: 3px solid var(--secondary);
                border-radius: 15px;
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 8px 20px;
                z-index: 10;
            }

            #game-screen.mode-parallel #cards-container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100%;
                width: 100%;
                padding: 0; margin: 0;
                pointer-events: none;
            }

            #game-screen.mode-parallel .card-perspective {
                pointer-events: auto;
                position: absolute;
                left: 50%;
                width: 30vh;
                height: 30vh;
                max-width: 68vw;
                max-height: 68vw;
            }

            #game-screen.mode-parallel #cards-container .card-perspective:first-child {
                top: 9vh;
                transform: translateX(-50%) rotate(180deg);
            }

            #game-screen.mode-parallel #cards-container .card-perspective:nth-child(2) {
                bottom: 9vh;
                transform: translateX(-50%);
            }

            /* תקציב גבהים מדויק ל-HUD המרכזי למניעת חפיפות */
            #game-screen.mode-parallel #diff-display {
                position: absolute;
                top: 41vh; left: 50%;
                transform: translate(-50%, -50%);
                z-index: 20;
                font-size: 0.95rem;
                padding: 4px 12px;
            }
            
            #game-screen.mode-parallel #live-status {
                position: absolute;
                top: 46vh; left: 50%;
                transform: translate(-50%, -50%);
                z-index: 20;
                margin: 0;
                font-size: 1rem;
                padding: 6px 16px;
            }

            #game-screen.mode-parallel #timer {
                position: absolute;
                top: 52vh; left: 50%;
                transform: translate(-50%, -50%);
                z-index: 20;
                margin: 0;
                font-size: 2.4rem;
                background: rgba(255,255,255,0.85);
                padding: 0 12px;
                border-radius: 10px;
            }
        }

        /* ==========================================================================
           2. מהפך מוחלט למסכי לנדסקייפ (Landscape - רוחב) - פריסת ימין ושמאל חכמה
           ========================================================================== */
        @media (orientation: landscape) {
            /* מניעת קריסה כללית במצב תורים */
            #game-screen.mode-turns .card-perspective {
                width: 38vh;
                height: 38vh;
            }
            #game-screen.mode-turns #scoreboard {
                padding: 8px 20px;
                margin-bottom: 10px;
            }
            #game-screen.mode-turns #cards-container {
                margin-bottom: 16px;
            }
            #game-screen.mode-turns #action-btn {
                min-width: 64px;
                max-width: 96px;
                padding: 10px 8px;
                font-size: 0.82rem;
            }
            #game-screen.mode-turns #timer {
                font-size: 2.2rem;
                margin-bottom: 5px;
            }
            #game-screen.mode-turns #live-status {
                margin-bottom: 8px;
                padding: 8px 20px;
                font-size: 1.1rem;
            }

            /* פריסת הדו-קרב לרוחב (ימין ושמאל) */
            #game-screen.mode-parallel {
                flex-direction: row;
            }

            #game-screen.mode-parallel #p1-area {
                position: absolute;
                top: 3vh; left: 3vw;
                width: 28vw;
                transform: rotate(180deg);
                background: white;
                border: 3px solid var(--secondary);
                border-radius: 12px;
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 6px 14px;
                z-index: 10;
            }

            #game-screen.mode-parallel #p2-area {
                position: absolute;
                bottom: 3vh; right: 3vw;
                width: 28vw;
                background: white;
                border: 3px solid var(--secondary);
                border-radius: 12px;
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 6px 14px;
                z-index: 10;
            }

            #game-screen.mode-parallel #cards-container {
                display: flex;
                flex-direction: row;
                justify-content: normal;
                align-items: center;
                height: 100%;
                width: 100%;
                padding: 0; margin: 0;
                pointer-events: none;
            }

            #game-screen.mode-parallel .card-perspective {
                pointer-events: auto;
                position: absolute;
                top: 50%;
                width: 44vh;
                height: 44vh;
                max-width: 28vw;
                max-height: 28vw;
            }

            /* שחקן 1 בצד שמאל - הפוך */
            #game-screen.mode-parallel #cards-container .card-perspective:first-child {
                left: 3vw;
                transform: translateY(-38%) rotate(180deg);
            }

            /* שחקן 2 בצד ימין - ישר */
            #game-screen.mode-parallel #cards-container .card-perspective:nth-child(2) {
                right: 3vw;
                transform: translateY(-62%);
            }

            /* טור שליטה מרכזי אנכי לרוחב למניעת חפיפות */
            #game-screen.mode-parallel #diff-display {
                position: absolute;
                top: 12vh; left: 50%;
                transform: translateX(-50%);
                z-index: 20;
                font-size: 0.95rem;
                padding: 4px 12px;
                white-space: nowrap;
            }

            #game-screen.mode-parallel #live-status {
                position: absolute;
                top: 25vh; left: 50%;
                transform: translateX(-50%);
                z-index: 20;
                margin: 0;
                font-size: 1rem;
                padding: 6px 16px;
                white-space: nowrap;
            }

            #game-screen.mode-parallel #timer {
                position: absolute;
                top: 46vh; left: 50%;
                transform: translate(-50%, -50%);
                z-index: 20;
                margin: 0;
                font-size: 2.6rem;
                background: rgba(255,255,255,0.85);
                padding: 0 15px;
                border-radius: 10px;
            }

        }

        /* התאמת גודל קטן למסכים נמוכים במיוחד של דף ההרשמה */
        @media (max-height: 550px) {
            #setup-screen { padding: 15px; max-width: 380px; }
            h1 { font-size: 1.8rem; margin: 2px 0; }
            p { margin: 2px 0 8px 0; font-size: 1rem; }
            .input-group { margin-bottom: 8px; }
            .input-group input, .input-group select { padding: 8px; font-size: 1rem; }
            button { padding: 10px 20px; font-size: 1.1rem; }
        }
    </style>
</head>
<body onclick="unlockAudio()">

    <a href="../index.html" class="home-button" title="חזרה">🏠</a>

    <div id="setup-screen">
        <h1>דאבל אקסטרים! 🎈</h1>
        <p>משחק מציאת סימנים מהיר וחווייתי</p>
        
        <div class="input-group">
            <label>🎮 מצב משחק:</label>
            <select id="game-mode-select">
                <option value="turns" selected>סבבים בתורים (אחד אחרי השני)</option>
                <option value="parallel">דו-קרב סימולטני (מסך מפוצל ביחד! ⚔️)</option>
            </select>
        </div>
        <div class="input-group">
            <label>🎈 שם שחקן 1 (למעלה במפוצל):</label>
            <input type="text" id="p1-input" value="יוסי">
        </div>
        <div class="input-group">
            <label>🌟 שם שחקן 2 (למטה במפוצל):</label>
            <input type="text" id="p2-input" value="דנה">
        </div>
        <div class="input-group">
            <label>🎯 כמות סימנים בקלף:</label>
            <select id="symbols-select">
                <option value="5" selected>5 סימנים (קל)</option>
                <option value="6">6 סימנים (בינוני)</option>
                <option value="7">7 סימנים (מאתגר)</option>
            </select>
        </div>
        <div class="input-group">
            <label>🔄 מספר סבבים:</label>
            <select id="rounds-select">
                <option value="3">3 סבבים</option>
                <option value="5" selected>5 סבבים</option>
                <option value="7">7 סבבים</option>
            </select>
        </div>
        <button onclick="startGame()">מתחילים לשחק! 🚀</button>
    </div>

    <div id="game-screen">
        <h1 id="round-header-title">סבב <span id="round-num">1</span> מתוך <span id="round-total">5</span></h1>
        
        <div id="scoreboard">
            <div class="player-score" id="p1-area">
                <span class="name" id="p1-label">שחקן 1</span>
                <span class="time" id="p1-time-box"><span id="p1-time">0.00</span></span>
            </div>
            <div id="diff-display">מתחילים...</div>
            <div class="player-score" id="p2-area">
                <span class="name" id="p2-label">שחקן 2</span>
                <span class="time" id="p2-time-box"><span id="p2-time">0.00</span></span>
            </div>
        </div>

        <div id="live-status">מוכנים? לקפוץ על הקלפים!</div>
        <div id="timer">0.00</div>

        <div id="play-area">
            <div id="cards-container">
                <div class="card-perspective">
                    <div class="card-inner" id="card1-inner">
                        <div class="card-back">⭐</div>
                        <div class="card-front" id="card1-front"></div>
                    </div>
                </div>
                <div class="card-perspective">
                    <div class="card-inner" id="card2-inner">
                        <div class="card-back">⭐</div>
                        <div class="card-front" id="card2-front"></div>
                    </div>
                </div>
            </div>

            <button id="action-btn" onclick="startTurn()">הפוך קלפים! 🃏</button>
        </div>
    </div>

    <audio id="errorSound"><source src="https://assets.mixkit.co/active_storage/sfx/3090/3090-preview.mp3" type="audio/mpeg"></audio>

    <script>
        const allSymbols = [
            '🍎', '🍌', '🍓', '🍉', '🍇', '🍊', '🍋', '🥥', '🍍', '🍕', '🍔', '🍟', '🍦', '🍩', '🍫', '🍭', '🧁', '🥐',
            '🐱', '🐶', '🦁', '🐵', '🐸', '🦄', '🦖', '🐙', '🐼', '🐰', '🦊', '🐯', '🐷', '🐮', '🐔', '🐢', '🐠', '🦉', 
            '🚗', '✈️', '🚂', '🚁', '🚀', '🚢', '🛴', '⚽', '🏀', '🎈', '🎁', '👑', '🎨', '🎸', '🎮', '🧩',
            '🌈', '☀️', '🌙', '🌸', '🌻', '⭐', '🌊', '🍀', '🔥', '⏰'
        ];

        let p1Name, p2Name, gameMode;
        let currentRound = 1, currentPlayer = 1;
        let p1TotalTime = 0, p2TotalTime = 0;
        let p1Points = 0, p2Points = 0;
        let symbolsPerCard = 5, totalRounds = 5;
        
        let startTime, timerInterval, commonSymbol;
        let isTurnActive = false;
        let p1Locked = false, p2Locked = false;

        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const actionBtn = document.getElementById('action-btn');
        const liveStatus = document.getElementById('live-status');
        const timerDisplay = document.getElementById('timer');
        const diffDisplay = document.getElementById('diff-display');
        
        const card1Inner = document.getElementById('card1-inner');
        const card2Inner = document.getElementById('card2-inner');
        const card1Front = document.getElementById('card1-front');
        const card2Front = document.getElementById('card2-front');

        let audioUnlocked = false;

        function unlockAudio() {
            if (audioUnlocked) return;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            audioUnlocked = true;
        }

        function playSuccessSound() {
            if (!audioUnlocked) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(523.25, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.15);
            
            setTimeout(() => {
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.frequency.setValueAtTime(659.25, ctx.currentTime);
                gain2.gain.setValueAtTime(0.1, ctx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                osc2.connect(gain2); gain2.connect(ctx.destination);
                osc2.start(); osc2.stop(ctx.currentTime + 0.25);
            }, 800);
        }

        function playFailSound() {
            if (audioUnlocked) {
                const sound = document.getElementById('errorSound');
                sound.currentTime = 0; sound.play();
            }
        }

        function speak(text) {
            if (!audioUnlocked) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'he-IL'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function startGame() {
            p1Name = document.getElementById('p1-input').value.trim() || "שחקן 1";
            p2Name = document.getElementById('p2-input').value.trim() || "שחקן 2";
            symbolsPerCard = parseInt(document.getElementById('symbols-select').value, 10);
            totalRounds = parseInt(document.getElementById('rounds-select').value, 10);
            gameMode = document.getElementById('game-mode-select').value;
            
            document.getElementById('p1-label').innerText = "🎈 " + p1Name;
            document.getElementById('p2-label').innerText = "🌟 " + p2Name;

            gameScreen.className = gameMode === 'parallel' ? 'mode-parallel' : 'mode-turns';

            unlockAudio();
            setupScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            resetGameMetrics();
            speak("מתחילים לשחק! בהצלחה!");
        }

        function resetGameMetrics() {
            currentRound = 1;
            currentPlayer = 1;
            p1TotalTime = 0; p2TotalTime = 0;
            p1Points = 0; p2Points = 0;
            p1Locked = false; p2Locked = false;
            
            document.getElementById('round-num').innerText = "1";
            document.getElementById('round-total').innerText = totalRounds;
            actionBtn.style.display = 'inline-block';
            timerDisplay.style.display = 'block';
            
            if (gameMode === 'parallel') {
                document.getElementById('p1-time').innerText = "0 נק'";
                document.getElementById('p2-time').innerText = "0 נק'";
            } else {
                document.getElementById('p1-time').innerText = "0.00 ש'";
                document.getElementById('p2-time').innerText = "0.00 ש'";
            }
            
            updateDiffDisplay();
            prepareNextTurnStatus();
        }

        function updateDiffDisplay() {
            if (gameMode === 'parallel') {
                if (p1Points === p2Points) {
                    diffDisplay.innerText = "תיקו זמני בנקודות!";
                } else if (p1Points > p2Points) {
                    diffDisplay.innerText = `👑 ${p1Name} מוביל ב-${p1Points - p2Points} נק'`;
                } else {
                    diffDisplay.innerText = `👑 ${p2Name} מוביל ב-${p2Points - p1Points} נק'`;
                }
            } else {
                if (p1TotalTime === 0 && p2TotalTime === 0) {
                    diffDisplay.innerText = "תיקו!";
                } else {
                    const diff = Math.abs(p1TotalTime - p2TotalTime).toFixed(2);
                    if (p1TotalTime < p2TotalTime) {
                        diffDisplay.innerText = `🏆 ${p1Name} מהיר/ה ב-${diff} ש'`;
                    } else if (p2TotalTime < p1TotalTime) {
                        diffDisplay.innerText = `🏆 ${p2Name} מהיר/ה ב-${diff} ש'`;
                    } else {
                        diffDisplay.innerText = "תיקו צמוד!";
                    }
                }
            }
        }

        function prepareNextTurnStatus() {
            card1Inner.classList.remove('flipped');
            card2Inner.classList.remove('flipped');
            actionBtn.disabled = false;
            
            if (gameMode === 'parallel') {
                document.getElementById('p1-area').classList.remove('active-p');
                document.getElementById('p2-area').classList.remove('active-p');
                liveStatus.innerText = `סבב ${currentRound}: להתכונן לדו-קרב! ⚔️`;
                actionBtn.innerText = "הפוך קלפים! 🃏";
            } else {
                const activeName = currentPlayer === 1 ? p1Name : p2Name;
                liveStatus.innerText = `תור המקצה של: ${activeName} ✨`;
                actionBtn.innerText = `הפוך קלפים (${activeName})`;
                
                if (currentPlayer === 1) {
                    document.getElementById('p1-area').classList.add('active-p');
                    document.getElementById('p2-area').classList.remove('active-p');
                } else {
                    document.getElementById('p2-area').classList.add('active-p');
                    document.getElementById('p1-area').classList.remove('active-p');
                }
            }
        }

        function getRandomElements(arr, num) {
            return [...arr].sort(() => 0.5 - Math.random()).slice(0, num);
        }

        function generateCards() {
            const pool = [...allSymbols];
            const commonIndex = Math.floor(Math.random() * pool.length);
            commonSymbol = pool[commonIndex];
            pool.splice(commonIndex, 1);

            const uniqueCount = symbolsPerCard - 1;
            const unique1 = getRandomElements(pool, uniqueCount);
            const remainingPool = pool.filter(sym => !unique1.includes(sym));
            const unique2 = getRandomElements(remainingPool, uniqueCount);

            return {
                s1: [...unique1, commonSymbol].sort(() => 0.5 - Math.random()),
                s2: [...unique2, commonSymbol].sort(() => 0.5 - Math.random())
            };
        }

        function startTurn() {
            actionBtn.disabled = true;
            const { s1, s2 } = generateCards();

            if (gameMode === 'parallel') {
                buildCardHTML(card1Front, s1, 1);
                buildCardHTML(card2Front, s2, 2);
            } else {
                buildCardHTML(card1Front, s1, currentPlayer);
                buildCardHTML(card2Front, s2, currentPlayer);
            }

            card1Inner.classList.add('flipped');
            card2Inner.classList.add('flipped');

            setTimeout(() => {
                isTurnActive = true;
                startTime = performance.now();
                timerInterval = setInterval(() => {
                    timerDisplay.innerText = ((performance.now() - startTime) / 1000).toFixed(2);
                }, 10);
            }, 800);
        }

        function buildCardHTML(element, symbols, playerNum) {
            element.innerHTML = '';
            element.className = `card-front symbols-${symbolsPerCard}`;
            symbols.forEach(sym => {
                const span = document.createElement('span');
                span.className = 'symbol';
                span.innerText = sym;
                span.onclick = (e) => {
                    e.stopPropagation();
                    checkMatch(sym, playerNum);
                };
                element.appendChild(span);
            });
        }

        function checkMatch(clickedSymbol, playerNum) {
            if (!isTurnActive) return;
            
            if (gameMode === 'parallel') {
                if (playerNum === 1 && p1Locked) return;
                if (playerNum === 2 && p2Locked) return;
            }

            if (clickedSymbol === commonSymbol) {
                clearInterval(timerInterval);
                const finalTurnTime = (performance.now() - startTime) / 1000;
                timerDisplay.innerText = finalTurnTime.toFixed(2);
                isTurnActive = false;
                playSuccessSound();

                card1Front.style.borderColor = 'var(--success)';
                card2Front.style.borderColor = 'var(--success)';

                if (gameMode === 'parallel') {
                    if (playerNum === 1) {
                        p1Points++;
                        document.getElementById('p1-time').innerText = `${p1Points} נק'`;
                        liveStatus.innerText = `נקודה ל-${p1Name}! 🎈`;
                    } else {
                        p2Points++;
                        document.getElementById('p2-time').innerText = `${p2Points} נק'`;
                        liveStatus.innerText = `נקודה ל-${p2Name}! 🌟`;
                    }
                    currentRound++;
                } else {
                    if (currentPlayer === 1) {
                        p1TotalTime += finalTurnTime;
                        document.getElementById('p1-time').innerText = p1TotalTime.toFixed(2) + " ש'";
                        currentPlayer = 2;
                    } else {
                        p2TotalTime += finalTurnTime;
                        document.getElementById('p2-time').innerText = p2TotalTime.toFixed(2) + " ש'";
                        currentRound++;
                        currentPlayer = 1;
                    }
                }

                updateDiffDisplay();

                setTimeout(() => {
                    card1Front.style.borderColor = 'var(--secondary)';
                    card2Front.style.borderColor = 'var(--secondary)';
                    if (currentRound <= totalRounds) {
                        if (gameMode !== 'parallel') {
                            document.getElementById('round-num').innerText = currentRound;
                        }
                        prepareNextTurnStatus();
                    } else {
                        endGame();
                    }
                }, 1500);
            } else {
                playFailSound();

                if (gameMode === 'parallel') {
                    if (playerNum === 1) {
                        p1Locked = true;
                        card1Inner.classList.add('shake');
                        card1Front.style.borderColor = 'var(--primary)';
                        setTimeout(() => {
                            p1Locked = false;
                            card1Inner.classList.remove('shake');
                            card1Front.style.borderColor = 'var(--secondary)';
                        }, 600);
                    } else {
                        p2Locked = true;
                        card2Inner.classList.add('shake');
                        card2Front.style.borderColor = 'var(--primary)';
                        setTimeout(() => {
                            p2Locked = false;
                            card2Inner.classList.remove('shake');
                            card2Front.style.borderColor = 'var(--secondary)';
                        }, 600);
                    }
                } else {
                    startTime -= 1000;
                    timerDisplay.classList.add('penalty-flash');
                    setTimeout(() => timerDisplay.classList.remove('penalty-flash'), 400);
                }
            }
        }

        function endGame() {
            isTurnActive = false;
            clearInterval(timerInterval);
            
            card1Inner.classList.remove('flipped');
            card2Inner.classList.remove('flipped');
            
            actionBtn.style.display = 'none';
            timerDisplay.style.display = 'none';

            let finalSpeech = "";
            if (gameMode === 'parallel') {
                if (p1Points === p2Points) {
                    liveStatus.innerText = `🏆 תיקו מושלם של ${p1Points} נקודות! קולולו! 🥳`;
                    finalSpeech = "תיקו מושלם! כל הכבוד לשניכם!";
                } else if (p1Points > p2Points) {
                    liveStatus.innerText = `👑 המנצח הגדול הוא ${p1Name} עם ${p1Points} נקודות! 🎉`;
                    finalSpeech = `כל הכבוד ל${p1Name} על הניצחון!`;
                } else {
                    liveStatus.innerText = `👑 המנצחת הגדולה היא ${p2Name} עם ${p2Points} נקודות! 🎉`;
                    finalSpeech = `כל הכבוד ל${p2Name} על הניצחון!`;
                }
            } else {
                if (p1TotalTime === p2TotalTime) {
                    liveStatus.innerText = "🏆 תיקו מוחלט בזמנים! לא יאומן! 🤩";
                    finalSpeech = "תיקו מוחלט בזמנים!";
                } else if (p1TotalTime < p2TotalTime) {
                    liveStatus.innerText = `👑 ${p1Name} ניצח/ה עם זמן כולל מהיר של ${p1TotalTime.toFixed(2)} שניות! 🏅`;
                    finalSpeech = `כל הכבוד ל${p1Name}! הגעת למקום הראשון!`;
                } else {
                    liveStatus.innerText = `👑 ${p2Name} ניצח/ה עם זמן כולל מהיר של ${p2TotalTime.toFixed(2)} שניות! 🏅`;
                    finalSpeech = `כל הכבוד ל${p2Name}! הגעת למקום הראשון!`;
                }
            }
            
            speak("המשחק נגמר! " + finalSpeech);
            
            setTimeout(() => {
                if(confirm("רוצים לשחק שוב?")) {
                    setupScreen.style.display = 'block';
                    gameScreen.style.display = 'none';
                }
            }, 3000);
        }
    </script>
</body>
</html>
