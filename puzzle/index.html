<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פאזל קסום ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #6c5ce7; 
            --primary-dark: #a29bfe;
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: radial-gradient(circle at center, #ffffff 0%, #dfe6e9 100%);
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .menu-trigger {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: var(--primary);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(108, 92, 231, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-trigger:hover {
            transform: scale(1.1) rotate(5deg);
        }

        #playAgainBtn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1500;
            display: none;
            padding: 20px 50px;
            font-size: 26px;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0); }
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            color: white;
            overflow-y: auto;
        }

        .overlay.active {
            display: flex;
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 700px;
            padding-bottom: 50px;
        }

        .gallery-item-container {
            position: relative;
            aspect-ratio: 1;
            border-radius: 15px;
        }

        .gallery-item {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            object-fit: cover;
            cursor: pointer;
            border: 4px solid transparent;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-dark);
        }

        .action-row {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s;
        }

        #main-canvas {
            display: block;
        }

        .instruction {
            position: fixed;
            bottom: 25px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            font-size: 20px;
            color: #2d3436;
            font-weight: 600;
            opacity: 0.5;
        }

        .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff7675;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .home-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary);
            text-decoration: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid var(--primary);
        }
    </style>
</head>
<body>

    <a href="../index.html" class="home-button">🏠</a>
    
    <audio id="snapSound" src="snap.mp3" preload="auto"></audio>
    <audio id="winSound" src="success.mp3" preload="auto"></audio>

    <button class="menu-trigger" onclick="toggleOverlay()">🖼️</button>
    <button id="playAgainBtn" onclick="resetToGallery()">🎮 לשחק שוב?</button>

    <div class="overlay" id="galleryOverlay">
        <div class="overlay-header">
            <h2>בחרו תמונה לפאזל ✨</h2>
            <button class="btn" style="background:#ff7675" onclick="toggleOverlay()">סגור ×</button>
        </div>

        <div class="action-row">
            <input type="file" id="imageInput" accept="image/*" style="display:none">
            <button class="btn" onclick="document.getElementById('imageInput').click()">📷 מהגלריה שלך</button>
            <button class="btn" style="background:#0984e3" onclick="addUrlImage()">🌐 מהאינטרנט</button>
            
            <select id="difficulty">
                <option value="2">4 חלקים (קל)</option>
                <option value="3" selected>9 חלקים (בינוני)</option>
                <option value="4">16 חלקים (קצת קשה)</option>
                <option value="5">25 חלקים (קשה)</option>
            </select>
        </div>

        <div class="gallery-grid" id="predefinedGallery"></div>
    </div>

    <canvas id="main-canvas"></canvas>
    <div class="instruction">גררו את החלקים למקומם ✨</div>

<script>
    // --- משתנים גלובליים ---
    let viewWidth = 0;
    let viewHeight = 0;
    let dpr = window.devicePixelRatio || 1;
    
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    
    let img = new Image();
    let pieces = [];
    let selectedPiece = null;
    let puzzleOffset = { x: 0, y: 0 };
    let puzzleSize = { w: 0, h: 0 };
    let isGameOver = false; // משתנה למעקב אחרי סיום המשחק

    // --- ניהול ממשק ---
    function toggleOverlay() {
        const overlay = document.getElementById('galleryOverlay');
        overlay.classList.toggle('active');
    }

    // --- ניהול גלריה ותמונות ---
    async function loadGallery() {
        const galleryEl = document.getElementById('predefinedGallery');
        galleryEl.innerHTML = ''; 
        
        const extensions = ['jpg', 'png', 'jpeg', 'webp'];
        
        // טעינת תמונות מקומיות (1-15)
        for (let i = 1; i <= 15; i++) {
            for (let ext of extensions) {
                const src = 'images/' + i + '.' + ext;
                const exists = await checkImageExists(src);
                if (exists) {
                    createGalleryItem(src, false);
                    break;
                }
            }
        }
        
        // טעינת תמונות מה-LocalStorage
        const saved = JSON.parse(localStorage.getItem('puzzle_web_images') || '[]');
        for (let i = 0; i < saved.length; i++) {
            createGalleryItem(saved[i], true, i);
        }
    }

    function checkImageExists(src) {
        return new Promise(function(resolve) {
            const tempImg = new Image();
            tempImg.onload = function() { resolve(true); };
            tempImg.onerror = function() { resolve(false); };
            tempImg.src = src;
        });
    }

    function createGalleryItem(src, isWeb, index = null) {
        const galleryEl = document.getElementById('predefinedGallery');
        const container = document.createElement('div');
        container.className = 'gallery-item-container';
        
        const thumb = document.createElement('img');
        thumb.src = src;
        thumb.className = 'gallery-item';
        thumb.onclick = function() {
            img = new Image();
            if (isWeb) {
                img.crossOrigin = "Anonymous";
            }
            img.onload = function() {
                document.getElementById('playAgainBtn').style.display = 'none';
                initGame();
                toggleOverlay();
            };
            img.src = src;
        };
        
        container.appendChild(thumb);
        
        if (isWeb) {
            const del = document.createElement('div');
            del.innerHTML = '×';
            del.className = 'delete-btn';
            del.onclick = function(e) {
                e.stopPropagation();
                removeWebImage(index);
            };
            container.appendChild(del);
        }
        
        galleryEl.appendChild(container);
    }

    function addUrlImage() {
        const url = prompt("הדבק כתובת תמונה מהאינטרנט:");
        if (url && url.startsWith('http')) {
            const saved = JSON.parse(localStorage.getItem('puzzle_web_images') || '[]');
            saved.push(url);
            localStorage.setItem('puzzle_web_images', JSON.stringify(saved));
            loadGallery();
        }
    }

    function removeWebImage(index) {
        if (confirm("למחוק את התמונה הזו מהגלריה?")) {
            const saved = JSON.parse(localStorage.getItem('puzzle_web_images') || '[]');
            saved.splice(index, 1);
            localStorage.setItem('puzzle_web_images', JSON.stringify(saved));
            loadGallery();
        }
    }

    class Piece {
    constructor(r, c, size, pW, pH, img, tabs) {
        this.r = r;
        this.c = c;
        this.size = size;
        this.pW = pW;
        this.pH = pH;
        this.img = img;
        this.tabs = tabs;
        
        this.tabSize = Math.floor(Math.min(pW, pH) * 0.28);
        this.tabBuffer = this.tabSize * 2;

        this.targetX = Math.floor(puzzleOffset.x + (c * pW));
        this.targetY = Math.floor(puzzleOffset.y + (r * pH));
        
        this.resetPosition();
        this.isLocked = false;
        this.groupId = 'r' + r + 'c' + c;
    }

    resetPosition() {
        const padding = 40;
        this.x = Math.floor(Math.random() * (viewWidth - this.pW - padding * 2) + padding);
        this.y = Math.floor(Math.random() * (viewHeight - this.pH - padding * 2) + padding);
    }

    contains(mx, my) {
        return mx > this.x && mx < this.x + this.pW && my > this.y && my < this.y + this.pH;
    }

    draw(context, isGhost = false) {
    context.save();
    
    // 1. שימוש ב-Math.floor כדי למנוע sub-pixel rendering (הגורם העיקרי לטשטוש באייפד)
    const posX = Math.floor(isGhost ? this.targetX : this.x);
    const posY = Math.floor(isGhost ? this.targetY : this.y);

    context.translate(posX, posY);
    
    // 2. יצירת הנתיב (Path) של הלשוניות
    context.beginPath();
    this.createPath(context);

    if (isGhost) {
        // ציור הצללית (המיקום המיועד בלוח)
        context.strokeStyle = "rgba(0,0,0,0.1)";
        context.lineWidth = 1;
        context.stroke();
        context.fillStyle = "rgba(0,0,0,0.05)";
        context.fill();
        context.restore();
        return;
    }

    // 3. חיתוך לפי הלשוניות
    context.clip();

    // 4. חישוב מדויק של מקור התמונה (Source)
    // שימוש ב-naturalWidth מבטיח רזולוציה מקורית
    const sW = this.img.naturalWidth / this.size;
    const sH = this.img.naturalHeight / this.size;
    
    const sx = this.c * sW;
    const sy = this.r * sH;
    
    // חישוב הבאפר של הלשוניות במונחי פיקסלים של תמונת המקור
    const sTabW = (this.tabBuffer / this.pW) * sW;
    const sTabH = (this.tabBuffer / this.pH) * sH;

    // 5. הציור עצמו - המיפוי בין הקובץ המקורי למסך
    context.drawImage(
        this.img,
        sx - sTabW, 
        sy - sTabH, 
        sW + (sTabW * 2), 
        sH + (sTabH * 2),
        -this.tabBuffer, 
        -this.tabBuffer, 
        this.pW + (this.tabBuffer * 2), 
        this.pH + (this.tabBuffer * 2)
    );

    context.restore();

    // 6. החלק שנוטה להישמט: מסגרת עדינה מאוד מסביב לחלק
    // זה עוזר להסתיר "חורים" של פיקסל אחד שנוצרים בגלל עיגול מספרים
    context.save();
    context.translate(posX, posY);
    context.beginPath();
    this.createPath(context);
    context.strokeStyle = "rgba(0,0,0,0.08)"; // מסגרת כמעט שקופה
    context.lineWidth = 0.5;
    context.stroke();
    context.restore();
}

    createPath(ctx) {
        const w = this.pW;
        const h = this.pH;
        const s = this.tabSize;
        const t = this.tabs;

        ctx.moveTo(0, 0);
        if (t.top !== 0) {
            ctx.lineTo(w * 0.35, 0);
            ctx.bezierCurveTo(w * 0.35, -s * t.top, w * 0.65, -s * t.top, w * 0.65, 0);
        }
        ctx.lineTo(w, 0);
        if (t.right !== 0) {
            ctx.lineTo(w, h * 0.35);
            ctx.bezierCurveTo(w + s * t.right, h * 0.35, w + s * t.right, h * 0.65, w, h * 0.65);
        }
        ctx.lineTo(w, h);
        if (t.bottom !== 0) {
            ctx.lineTo(w * 0.65, h);
            ctx.bezierCurveTo(w * 0.65, h + s * t.bottom, w * 0.35, h + s * t.bottom, w * 0.35, h);
        }
        ctx.lineTo(0, h);
        if (t.left !== 0) {
            ctx.lineTo(0, h * 0.65);
            ctx.bezierCurveTo(-s * t.left, h * 0.65, -s * t.left, h * 0.35, 0, h * 0.35);
        }
        ctx.closePath();
    }
}

    function initGame() {
        if (!img.src) return;
        
        pieces = [];
        isGameOver = false;
        const size = parseInt(document.getElementById('difficulty').value);
        const ratio = img.width / img.height;

        // במקום חילוק פשוט, אנחנו מוודאים שכל חלק מקבל כמות פיקסלים שלמה מהמקור
        const sW = Math.floor(img.naturalWidth / size);
        const sH = Math.floor(img.naturalHeight / size);
        
        let w = viewWidth * 0.8;
        let h = w / ratio;
        
        if (h > viewHeight * 0.7) {
            h = viewHeight * 0.7;
            w = h * ratio;
        }
        
        puzzleSize = { w: w, h: h };
        puzzleOffset = { x: (viewWidth - w) / 2, y: (viewHeight - h) / 2 };
        
        const hTabs = [];
        const vTabs = [];
        
        for (let i = 0; i <= size; i++) {
            hTabs[i] = [];
            vTabs[i] = [];
            for (let j = 0; j <= size; j++) {
                hTabs[i][j] = Math.random() > 0.5 ? 1 : -1;
                vTabs[i][j] = Math.random() > 0.5 ? 1 : -1;
            }
        }

        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                const tabs = {
                    top: (r === 0) ? 0 : hTabs[r][c],
                    right: (c === size - 1) ? 0 : vTabs[r][c + 1],
                    bottom: (r === size - 1) ? 0 : -hTabs[r + 1][c],
                    left: (c === 0) ? 0 : -vTabs[r][c]
                };
                
                const piece = new Piece(r, c, size, w/size, h/size, img, tabs);
                pieces.push(piece);
            }
        }
    }

    function render() {
        ctx.clearRect(0, 0, viewWidth, viewHeight);
        
        if (isGameOver) {
            // ציור התמונה המקורית המלאה בסיום
            ctx.save();
            ctx.shadowBlur = 20; ctx.shadowColor = "rgba(0,0,0,0.2)";
            ctx.drawImage(img, puzzleOffset.x, puzzleOffset.y, puzzleSize.w, puzzleSize.h);
            ctx.restore();
        } else {

        // 1. צלליות
        for (let i = 0; i < pieces.length; i++) {
            pieces[i].draw(ctx, true);
        }

        // 2. חלקים נעולים
        for (let i = 0; i < pieces.length; i++) {
            if (pieces[i].isLocked) {
                pieces[i].draw(ctx);
            }
        }

        // 3. חלקים חופשיים
        for (let i = 0; i < pieces.length; i++) {
            if (!pieces[i].isLocked) {
                if (!selectedPiece || pieces[i].groupId !== selectedPiece.groupId) {
                    pieces[i].draw(ctx);
                }
            }
        }

        // 4. החלק שנגרר
        if (selectedPiece) {
            for (let i = 0; i < pieces.length; i++) {
                if (pieces[i].groupId === selectedPiece.groupId) {
                    pieces[i].draw(ctx);
                }
            }
        }
    }
        
        requestAnimationFrame(render);
    }

    // --- אירועי מגע ועכבר ---
    function handleStart(e) {
        if (isGameOver) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const mouseX = clientX - rect.left;
        const mouseY = clientY - rect.top;
        
        for (let i = pieces.length - 1; i >= 0; i--) {
            const p = pieces[i];
            if (!p.isLocked && p.contains(mouseX, mouseY)) {
                selectedPiece = p;
                selectedPiece.offsetX = mouseX - p.x;
                selectedPiece.offsetY = mouseY - p.y;
                
                // הבאת הקבוצה קדימה
                const groupId = p.groupId;
                const group = [];
                for (let j = pieces.length - 1; j >= 0; j--) {
                    if (pieces[j].groupId === groupId) {
                        group.push(pieces.splice(j, 1)[0]);
                    }
                }
                for (let j = 0; j < group.length; j++) {
                    pieces.push(group[j]);
                }
                break;
            }
        }
    }

    function handleMove(e) {
        if (!selectedPiece || isGameOver) return;
        
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const mouseX = clientX - rect.left;
        const mouseY = clientY - rect.top;
        
        const newX = mouseX - selectedPiece.offsetX;
        const newY = mouseY - selectedPiece.offsetY;
        
        const dx = newX - selectedPiece.x;
        const dy = newY - selectedPiece.y;
        
        const groupId = selectedPiece.groupId;
        for (let i = 0; i < pieces.length; i++) {
            if (pieces[i].groupId === groupId) {
                pieces[i].x += dx;
                pieces[i].y += dy;
            }
        }
        
        if (e.cancelable) e.preventDefault();
    }

    function handleEnd() {
        if (!selectedPiece || isGameOver) return;
        
        const groupId = selectedPiece.groupId;
        const group = [];
        for (let i = 0; i < pieces.length; i++) {
            if (pieces[i].groupId === groupId) group.push(pieces[i]);
        }
        
        const first = group[0];
        const snapSound = document.getElementById('snapSound');
        
        // בדיקת הצמדה ללוח
        const distToTarget = Math.hypot(first.x - first.targetX, first.y - first.targetY);
        if (distToTarget < 35) {
            for (let i = 0; i < group.length; i++) {
                group[i].x = group[i].targetX;
                group[i].y = group[i].targetY;
                group[i].isLocked = true;
            }
            snapSound.currentTime = 0;
            snapSound.play().catch(function() {});
        } else {
            // בדיקת הצמדה בין חלקים
            for (let i = 0; i < pieces.length; i++) {
                const other = pieces[i];
                if (other.isLocked || other.groupId === groupId) continue;
                
                for (let j = 0; j < group.length; j++) {
                    const p = group[j];
                    const isNeighbor = (Math.abs(p.r - other.r) === 1 && p.c === other.c) || 
                                       (Math.abs(p.c - other.c) === 1 && p.r === other.r);
                    
                    if (isNeighbor) {
                        const expectedX = p.x + (other.c - p.c) * p.pW;
                        const expectedY = p.y + (other.r - p.r) * p.pH;
                        
                        if (Math.hypot(other.x - expectedX, other.y - expectedY) < 30) {
                            const oldId = other.groupId;
                            const diffX = other.x - expectedX;
                            const diffY = other.y - expectedY;
                            
                            for (let k = 0; k < pieces.length; k++) {
                                if (pieces[k].groupId === oldId) {
                                    pieces[k].groupId = groupId;
                                    pieces[k].x -= diffX;
                                    pieces[k].y -= diffY;
                                }
                            }
                            snapSound.currentTime = 0;
                            snapSound.play().catch(function() {});
                        }
                    }
                }
            }
        }
        
        checkWin();
        selectedPiece = null;
    }

    function checkWin() {
        let allLocked = true;
        for (let i = 0; i < pieces.length; i++) {
            if (!pieces[i].isLocked) {
                allLocked = false;
                break;
            }
        }
        
        if (pieces.length > 0 && allLocked) {
            isGameOver = true; // מעבר למצב תמונה מלאה
            document.getElementById('winSound').play().catch(function() {});
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            setTimeout(function() {
                document.getElementById('playAgainBtn').style.display = 'block';
            }, 1000);
        }
    }

    function resetToGallery() {
        isGameOver = false;
        document.getElementById('playAgainBtn').style.display = 'none';
        toggleOverlay();
    }

    function resize() {
    dpr = window.devicePixelRatio || 1;
    viewWidth = window.innerWidth;
    viewHeight = window.innerHeight;
    
    // הגדרת גודל פיזי (כמות הפיקסלים האמיתית במסך)
    canvas.width = viewWidth * dpr;
    canvas.height = viewHeight * dpr;
    
    // הגדרת גודל תצוגה (מה שהדפדפן חושב)
    canvas.style.width = viewWidth + 'px';
    canvas.style.height = viewHeight + 'px';
    
    // אומרים לקנבס לעבוד ביחידות לוגיות (כדי ש-100px בקוד יהיו 100px במסך)
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    
    // אם כבר התחלנו משחק, אנחנו חייבים לאתחל את המיקומים מחדש 
    // כי ה-viewWidth השתנה (למשל בסיבוב האייפד)
    if (img.src) initGame();
}

    // --- אתחול ---
    window.addEventListener('resize', resize);
    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('touchstart', handleStart, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchend', handleEnd);

    document.getElementById('imageInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            img = new Image();
            img.onload = function() {
                initGame();
                toggleOverlay();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.onload = function() {
        resize();
        render();
        loadGallery();
        // טעינת תמונה ראשונה כברירת מחדל
        setTimeout(function() {
            const first = document.querySelector('.gallery-item');
            if (first) first.click(); else toggleOverlay();
        }, 500);
    };
</script>
</body>
</html>
